<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>TikTok Downloader</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #0f0f0f;
      color: white;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      width: 300px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 20px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #00ffcc;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00ccaa;
    }

    #result {
      margin-top: 25px;
    }

    video {
      width: 300px;
      border-radius: 10px;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      color: #00ffcc;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🔥 TikTok Downloader No Watermark</h2>

<input type="text" id="link" placeholder="Paste link TikTok di sini">
<br>
<button onclick="download()">Download</button>

<div id="result"></div>

<script>
async function download() {
  const url = document.getElementById("link").value;

  if (!url) {
    alert("Masukkan link dulu!");
    return;
  }

  document.getElementById("result").innerHTML = "⏳ Loading...";

  const apis = [
    `https://corsproxy.io/?https://api.tikwm.com/?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?https://api.tiklydown.eu.org/api/download?url=${encodeURIComponent(url)}`
  ];

  for (let api of apis) {
    try {
      const res = await fetch(api);
      const data = await res.json();

      let video = null;

      if (data?.data?.play) {
        video = data.data.play;
      }

      if (data?.video) {
        video = data.video;
      }

      if (video) {
        document.getElementById("result").innerHTML = `
          <video controls src="${video}"></video>
          <br>
          <a href="${video}" download>⬇️ Download Video</a>
        `;
        return;
      }

    } catch (err) {
      console.log("API gagal, coba berikutnya...");
    }
  }

  document.getElementById("result").innerHTML = "❌ Semua API gagal, coba link lain";
}
</script>

</body>
</html>
