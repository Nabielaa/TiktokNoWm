<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>TikTok Downloader</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #0f0f0f;
      color: white;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      width: 300px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 20px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #00ffcc;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00ccaa;
    }

    #result {
      margin-top: 25px;
    }

    video {
      width: 300px;
      border-radius: 10px;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      color: #00ffcc;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🔥 TikTok Downloader No Watermark</h2>

<input type="text" id="link" placeholder="Paste link TikTok di sini">
<br>
<button onclick="download()">Download</button>

<div id="result"></div>

<script>
function download() {
  const url = document.getElementById("link").value;

  if (!url) {
    alert("Masukkan link dulu!");
    return;
  }

  // redirect ke downloader luar (pasti work)
  window.open(`https://snaptik.app/en?url=${encodeURIComponent(url)}`, '_blank');
}
</script>

</body>
</html>
