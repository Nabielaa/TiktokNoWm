<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Downloader TikTok</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 50px;
      background: #111;
      color: white;
    }
    input {
      padding: 10px;
      width: 300px;
    }
    button {
      padding: 10px;
      cursor: pointer;
    }
    video {
      margin-top: 20px;
      width: 300px;
    }
  </style>
</head>
<body>

<h2>TikTok Downloader No Watermark</h2>

<input type="text" id="link" placeholder="Masukkan link TikTok">
<br><br>
<button onclick="download()">Download</button>

<div id="result"></div>

<script>
async function download() {
  const url = document.getElementById("link").value;

  if (!url) {
    alert("Masukkan link dulu!");
    return;
  }

  document.getElementById("result").innerHTML = "Loading...";

  try {
    const res = await fetch(`https://api.tikwm.com/?url=${url}`);
    const data = await res.json();

    if (data && data.data && data.data.play) {
      document.getElementById("result").innerHTML = `
        <video controls src="${data.data.play}"></video>
        <br><br>
        <a href="${data.data.play}" download>Download Video</a>
      `;
    } else {
      document.getElementById("result").innerHTML = "Gagal ambil video 😢";
    }
  } catch (err) {
    document.getElementById("result").innerHTML = "Error API / kena block 😭";
  }
}
</script>

</body>
</html>
